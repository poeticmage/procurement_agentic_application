  travel_services:
    display_name: Business Travel Services
    category_code: TRV-01
    parent_category: TRAVEL
    description: >
      Corporate air, rail, and ground travel; hotel accommodation;
      travel insurance; visa and forex services.
    owner_team: FINANCE_AND_ADMIN
    risk_level: LOW
    sub_categories:
      air_travel:
        description: Domestic and international flights
        booking_class_policy:
          below_4_hours: economy
          4_to_8_hours: economy_or_premium_economy
          above_8_hours_and_vp_plus: business_class
          business_class_requires_cxo_approval: true
      rail_travel:
        description: Train bookings (preferred for routes under 500km)
        preferred_over_air: true
      ground_transport:
        description: Taxi, cab-hailing, car rental, airport transfers
      accommodation:
        description: Hotels and serviced apartments
        daily_rate_cap_inr_by_city:
          tier_1_cities: 8000         # Mumbai, Delhi, Bengaluru, Chennai, Hyderabad
          tier_2_cities: 5000
          international: 15000        # equivalent INR
      travel_insurance:
        description: Corporate travel insurance
        mandatory: true
      visa_and_forex:
        description: Visa application support and foreign exchange
      conferences_and_events:
        description: Registration and logistics for external events

    required_fields:
      - field: traveler_count
        type: integer
        minimum: 1
        required: true
      - field: destination
        type: string
        required: true
      - field: travel_dates
        type: date_range
        required: true
      - field: purpose_of_travel
        type: text
        required: true
      - field: sub_category
        type: enum
        values: [air_travel, rail_travel, ground_transport, accommodation, travel_insurance, visa_and_forex, conferences_and_events]
        required: true
      - field: budget_inr
        type: number
        required: true
      - field: manager_approved_travel
        type: boolean
        required: true

    contract_requirements:
      purchase_order_required: false
      booking_through_approved_tmc_required: true
      nda_required: false
      msa_required: false

    cross_references:
      approvals: approvals.yaml#approval_chains.travel_services
      compliance: compliance.yaml#categories.travel_services
      vendor_rules: vendor_rules.yaml#preferred_vendors.travel_services
      procurement_method: procurement_methods.yaml#method_selection_matrix.travel_services