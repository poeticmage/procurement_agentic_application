      nda_required: false
      msa_required: false
      warranty_and_installation_agreement_required: true

    cross_references:
      approvals: approvals.yaml#approval_chains.furniture
      compliance: compliance.yaml#categories.furniture
      vendor_rules: vendor_rules.yaml#preferred_vendors.furniture
      procurement_method: procurement_methods.yaml#method_selection_matrix.furniture

