  # TELECOM
  # ══════════════════════════════════════════════════════════════════════════

  telecom_services:
    display_name: Telecommunications Services
    category_code: TEL-01
    parent_category: TELECOM
    description: >
      Mobile telephony, fixed-line voice, broadband, MPLS, SD-WAN services,
      UCaaS, and international connectivity.
    owner_team: IT_DEPARTMENT
    risk_level: HIGH
    risk_rationale: >
      Critical business communication infrastructure; regulatory compliance
      with DOT/TRAI; security considerations for network traffic.
    sub_categories:
      mobile_telephony:
        description: Corporate SIM cards, mobile data plans
      fixed_broadband:
        description: Office internet connectivity (broadband, leased line)
      mpls_and_sd_wan:
        description: Enterprise WAN connectivity between offices
        requires_architecture_review: true
      unified_communications:
        description: UCaaS, hosted PBX, Teams Calling
      international_connectivity:
        description: Global MPLS, international leased lines

    required_fields:
      - field: service_type
        type: enum
        values: [mobile_telephony, fixed_broadband, mpls_and_sd_wan, unified_communications, international_connectivity]
        required: true
      - field: expected_users_or_sites
        type: integer
        required: true
      - field: bandwidth_requirements
        type: string
        required_for: [fixed_broadband, mpls_and_sd_wan, international_connectivity]
      - field: contract_duration_months
        type: integer
        required: true
        minimum: 12
      - field: sla_requirements
        type: text
        required: true
      - field: budget_monthly_inr
        type: number
        required: true
      - field: budget_total_contract_inr
        type: number
        required: true
      - field: current_provider_and_contract_expiry
        type: string
        required_for: renewal

    contract_requirements:
      purchase_order_required: true
      nda_required: false
      msa_required: true
      sla_required: true
      minimum_uptime_sla_percentage: 99.9
      credits_for_sla_breach: true
      termination_for_convenience_clause: true
      early_termination_fee_cap_months: 3

    cross_references:
      approvals: approvals.yaml#approval_chains.telecom_services
      compliance: compliance.yaml#categories.telecom_services
      vendor_rules: vendor_rules.yaml#preferred_vendors.telecom_services
      procurement_method: procurement_methods.yaml#method_selection_matrix.telecom_services

