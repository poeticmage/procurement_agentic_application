# ---------------------------------------------------------------------------
# Conflict-of-interest rules during procurement process
# ---------------------------------------------------------------------------
conflict_of_interest:
  disclosure_required: true
  evaluator_coi_declaration: true
  recusal_required_if_coi: true
  recusal_documented: true
  unapproved_vendor_contact_prohibited: true
  prohibition_on_post_process_employment:
    duration_months: 12
    applies_to: [procurement_team, evaluation_committee_members]