      reason: Government security advisory
      reference: GOI_Advisory_2020
      added_date: "2020-06-15"
      added_by: ciso
    - name: ZTE Corporation
      vendor_id: ~
      category_scope: [network_equipment, telecom_services]
      reason: Government security advisory
      reference: GOI_Advisory_2020
      added_date: "2020-06-15"
      added_by: ciso
    - name: NSO Group
      vendor_id: ~
      category_scope: [software]
      reason: Surveillance/spyware designation
      added_date: "2021-11-10"
      added_by: legal_team
  note: >
    Engagement with any banned vendor, regardless of amount or justification,
    requires CEO + General Counsel written approval and Board notification.

# ---------------------------------------------------------------------------
# Diversity & inclusion sourcing targets
# ---------------------------------------------------------------------------
diversity_sourcing:
  enabled: true
  targets:
    msme_spend_percentage: 25        # % of annual procurement spend
    women_owned_business_percentage: 10
    sc_st_owned_business_percentage: 5
  tracking:
    frequency: quarterly
    report_to: cpo_and_board
  incentives:
    msme_payment_terms_days: 30      # faster than standard 45 days
    msme_bid_evaluation_preference_percentage: 10  # price preference

# ---------------------------------------------------------------------------
# Vendor performance management
# ---------------------------------------------------------------------------
vendor_performance:
  kpi_framework:
    on_time_delivery:
      weight: 0.30
      minimum_score: 80             # out of 100
    quality_acceptance_rate:
      weight: 0.25
      minimum_score: 95
    invoice_accuracy:
      weight: 0.15
      minimum_score: 98
    sla_compliance:
      weight: 0.20
      minimum_score: 90
    responsiveness:
      weight: 0.10
      minimum_score: 80

  scoring:
    method: weighted_average
    review_frequency_months: 6
    scorecard_shared_with_vendor: true

  thresholds:
    preferred_status_minimum: 85
    approved_status_minimum: 70
    probation_threshold: 60
    disqualification_threshold: 50

  escalation:
    below_probation_threshold:
      action: place_on_vendor_probation
      probation_period_months: 3
      improvement_plan_required: true
    consecutive_reviews_below_approved:
      count: 2
      action: suspend_new_orders
    below_disqualification_threshold:
      action: remove_from_approved_list
      cpo_sign_off_required: true
      requalification_possible_after_months: 12

# ---------------------------------------------------------------------------
# Payment terms
# ---------------------------------------------------------------------------
payment_terms:
  defaults:
    standard_net_days: 45
    msme_net_days: 30
    early_payment_discount_accepted: true

  category_overrides:
    office_supplies:
      net_days: 30
    travel_services:
      net_days: 7                    # TMC invoices processed quickly
    cloud_services:
      payment_type: monthly_subscription_auto_pay
    software:
      payment_type: annual_upfront_or_monthly
      upfront_discount_minimum_percentage: 10  # must negotiate if paying upfront
    professional_services:
      milestone_based_payment: true
      advance_percentage_maximum: 20

  late_payment:
    penalty_applies: true
    msme_late_payment_interest_rate_annual: 18  # as per MSMED Act India