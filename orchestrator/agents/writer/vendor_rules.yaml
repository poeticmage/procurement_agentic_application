# =============================================================================
# VENDOR RULES & MANAGEMENT POLICIES
# =============================================================================
# Preferred vendors, banned vendors, qualification criteria, performance
# management, diversity & inclusion targets, and relationship governance.
#
# Schema version: 2.1.0
# Last reviewed:  2025-01-01
# Owner:          Procurement Governance Team
# =============================================================================

meta:
  schema_version: "2.1.0"
  policy_effective_date: "2025-01-01"
  review_cycle_months: 12
  owner_team: vendor_management
  contact_email: vendor-management@company.com

# ---------------------------------------------------------------------------
# Vendor risk classification
# ---------------------------------------------------------------------------
vendor_risk_classification:
  critical:
    label: Critical Vendor
    description: >
      Vendors whose failure or breach would cause significant operational
      disruption, data loss, or regulatory breach.
    annual_review_required: true
    business_continuity_plan_required: true
    dual_sourcing_encouraged: true
    exit_plan_required: true
    examples:
      - Core ERP/CRM vendors
      - Cloud infrastructure providers
      - Payment processors
  high:
    label: High-Risk Vendor
    description: >
      Vendors handling sensitive data or providing important services with
      moderate substitutability.
    annual_review_required: true
    exit_plan_encouraged: true
  medium:
    label: Medium-Risk Vendor
    description: Standard commercial vendors with limited data access.
    review_frequency_months: 24
  low:
    label: Low-Risk Vendor
    description: Commoditised supply with easy substitution.
    review_frequency_months: 36

# ---------------------------------------------------------------------------
# Vendor qualification & onboarding
# ---------------------------------------------------------------------------
qualification:
  mandatory_documents:
    - document: certificate_of_incorporation
      required: true
    - document: gst_registration
      required: true
      applicable_regions: [india]
    - document: pan_card
      required: true
      applicable_regions: [india]
    - document: msme_certificate
      required: false
      note: Required only if vendor claims MSME status
    - document: bank_account_details_with_cancelled_cheque
      required: true
    - document: audited_financial_statements
      required: true
      years_required: 2
      waived_for_spend_below_inr: 500000
    - document: trade_references
      minimum_count: 2
      required_for_spend_above_inr: 500000

  financial_health_checks:
    credit_score_check_required: true
    minimum_annual_turnover_inr_by_category:
      laptop: 10000000
      desktop: 10000000
      software: 5000000
      cloud_services: 50000000
      network_equipment: 20000000
      consulting_services: 5000000
      professional_services: 10000000
      training_services: 1000000
      telecom_services: 100000000
      furniture: 2000000
      office_supplies: 500000
      travel_services: 5000000
    negative_net_worth_disqualifies: true

  legal_screening:
    sanctions_screening_required: true          # UN, OFAC, EU lists
    litigation_check_required: true
    insolvency_check_required: true
    politically_exposed_persons_check: true
    beneficial_ownership_disclosure_required: true

  onboarding_sla_days: 10

